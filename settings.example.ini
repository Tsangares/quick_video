[paths]
# Where downloaded videos go
download_dir = ~/Videos

# Thumbnail cache, last-video state, link history, queue
cache_dir = ~/.quick_video

# Waveform cache
waveform_dir = ~/.quick_video/audio

# Quick save files
save_dir = ~/Videos

# Default directory for exported videos
export_dir = ~/Videos

# Recent files list location
recents_file = ~/.quick_video/.recents.txt

[ui]
# Privacy mode: blacks out video preview and hides timeline thumbnails
# Toggle with ` key. Persists across sessions when changed.
privacy_mode = false

[downloads]
# Override download directory (optional, takes priority over download_dir)
# aux_download_dir = /some/other/path
